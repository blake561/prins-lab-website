- id: microbiome
  title: "Gut Microbiome in PAH"
  summary: "Emerging evidence points to gut dysbiosis as a contributor to pulmonary vascular disease and right ventricular dysfunction. Our lab was among the first to characterize the proinflammatory gut microbiome and altered circulating microbial metabolites in PAH patients. We have shown that Lactobacillus restructures the micro- and mycobiome to combat inflammation-mediated RV dysfunction, and demonstrated that microbiota transplant therapy is safe and feasible in PAH."
  papers:
