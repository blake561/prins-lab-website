- id: ferroptosis
  title: "Ferroptosis & Inflammation in PH"
  summary: "Ferroptosis — a form of iron-dependent cell death driven by lipid peroxidation — has emerged as a central mechanism linking metabolic derangements and pathological inflammation in pulmonary hypertension. Our lab discovered that ferroptosis promotes PH development and demonstrated that ferroptosis inhibition can rescue RV function in large-animal models, opening new therapeutic avenues."
  papers:
    - title: "Ferroptosis-Mediated Inflammation Promotes Pulmonary Hypertension"
      authors: "Kazmirczak F, Vogel NT, Prisco SZ, Patterson MT, Annis J, Moon RT, et al."
      journal: "Circulation Research, 2024"
