- id: rv-metabolism
  title: "RV Metabolic Reprogramming"
  summary: "The failing right ventricle undergoes profound metabolic reprogramming. Our lab uses multi-omic approaches — proteomics, metabolomics, and transcriptomics — to define the metabolic landscape of RV dysfunction across species. We have shown that intermittent fasting and AMPK activation can restructure RV lipid metabolism and microtubules, and identified novel targets like WNK1 and O-GlcNAcylation that drive metabolic derangements in PAH."
