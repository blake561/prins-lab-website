- id: microtubules
  title: "Microtubules, JP2 & RV Contractility"
  summary: "Pathological microtubule remodeling disrupts the mechanical and signaling architecture of cardiomyocytes in the failing right ventricle. Our lab has shown that microtubule depolymerization with colchicine rescues RV function, and that the microtubule-junctophilin-2 axis links T-tubule disruptions to mitochondrial dysfunction. We have also identified GP130 inflammatory signaling as a driver of this process and demonstrated that GP130 antagonism enhances RV function in large-animal models."
