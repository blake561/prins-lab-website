- id: multi-organ
  title: "Multi-Organ Failure in PAH & RVF"
  summary: "Pulmonary arterial hypertension (PAH) is increasingly recognized as a systemic disease. Our lab investigates how PAH-driven right ventricular failure leads to dysfunction in distant organs — particularly the liver. We have shown that PAH induces a metabolic and inflammatory hepatopathy characterized by disrupted branched-chain amino acid metabolism and ferroptosis, and we are working to define targetable pathways that connect cardiopulmonary hemodynamics to end-organ damage."
  papers:
    - title: "Pulmonary Arterial Hypertension Induces a Metabolic and Inflammatory Hepatopathy"
